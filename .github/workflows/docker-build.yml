# ==============================================================
# Misaka MediaFlow — GitHub Actions CI/CD
# 自动构建 Docker 多架构镜像并推送到 GHCR / Docker Hub
#
# 触发条件:
#   - 推送 tag (v*)        → 正式发布 (latest + 版本号)  [amd64 + arm64]
#   - 推送 test 分支       → 测试版 (test)             [仅 amd64]
#   - 手动触发             → 自定义 tag
# ==============================================================

name: 构建并推送 Docker 镜像

on:
  push:
    tags:
      - 'v*'
    branches:
      - test
  workflow_dispatch:
    inputs:
      tag:
        description: '自定义镜像 tag (例如: test, beta)'
        required: false
        default: 'dev'

env:
  # ---- 修改为你的信息 ----
  IMAGE_NAME: misaka-mediaflow
  # GHCR 镜像地址会自动拼接为: ghcr.io/<owner>/<IMAGE_NAME>
  # Docker Hub 镜像地址: <DOCKERHUB_USERNAME>/<IMAGE_NAME>

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ==================== 1. 检出代码 ====================
      - name: 检出代码
        uses: actions/checkout@v6

      # ==================== 2. 确定构建平台 ====================
      - name: 设置构建平台
        id: platforms
        run: |
          # test 分支 → 仅 amd64 (加速测试)
          # main / tag / 手动 → amd64 + arm64
          if [[ "${{ github.ref }}" == "refs/heads/test" ]]; then
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
            echo "platform_display=linux/amd64" >> $GITHUB_OUTPUT
          else
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
            echo "platform_display=linux/amd64, linux/arm64" >> $GITHUB_OUTPUT
          fi

      # ==================== 3. 准备构建元信息 ====================
      - name: 生成 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            # tag 推送 → v1.0.0 + latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # test 分支推送 → test
            type=raw,value=test,enable=${{ github.ref == 'refs/heads/test' }}
            # 手动触发 → 自定义 tag
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      # ==================== 4. 设置构建变量 ====================
      - name: 设置构建变量
        id: vars
        run: |
          # 版本号：从 tag 提取，或使用分支名
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          elif [[ "${{ github.ref }}" == "refs/heads/test" ]]; then
            VERSION="test"
          else
            VERSION="manual"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "git_commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      # ==================== 5. 设置 QEMU (多架构) ====================
      - name: 设置 QEMU
        if: steps.platforms.outputs.platforms != 'linux/amd64'
        uses: docker/setup-qemu-action@v3

      # ==================== 6. 设置 Buildx ====================
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ==================== 7. 登录 GHCR ====================
      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ==================== 8. 登录 Docker Hub ====================
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ==================== 9. 构建并推送 ====================
      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ steps.platforms.outputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            GIT_COMMIT=${{ steps.vars.outputs.git_commit }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}

      # ==================== 10. 输出结果 ====================
      - name: 输出镜像结果
        run: |
          {
            echo "### 🐳 Docker 镜像已发布"
            echo ""
            echo "**版本:** ${{ steps.vars.outputs.version }}"
            echo "**提交:** ${{ steps.vars.outputs.git_commit }}"
            echo "**分支/标签:** ${{ github.ref_name }}"
            echo "**平台:** ${{ steps.platforms.outputs.platform_display }}"
            echo ""
            echo "**镜像标签:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

